<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catan Board Visualizer</title>
  <meta name="description" content="Debug visualizer for Catan game boards using Colonist.io game data">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="app-shell">
    <div class="tab-bar">
      <button id="analyticsTabBtn" class="tab-btn active" type="button">Analytics</button>
      <button id="playgroundTabBtn" class="tab-btn" type="button">Playground</button>
    </div>

    <section id="analyticsTab" class="tab-panel active">
      <div id="controls">
        <label for="gameSelector">Game:</label>
        <select id="gameSelector">
          <option disabled selected>Loading…</option>
        </select>
        <span id="gameCount"></span>
        <div id="paginationControls" style="display:inline-flex;align-items:center;gap:6px;margin-left:10px;">
          <button id="pagePrevBtn" class="tab-btn" type="button" style="padding:4px 10px;">&laquo; Prev</button>
          <label for="pageInput" style="font-size:12px;color:#94a3b8;">Page</label>
          <input id="pageInput" type="number" min="1" value="1"
            style="width:52px;padding:3px 5px;border-radius:5px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;font-size:12px;text-align:center;">
          <span id="pageTotalLabel" style="font-size:12px;color:#94a3b8;">of 1</span>
          <button id="pageNextBtn" class="tab-btn" type="button" style="padding:4px 10px;">Next &raquo;</button>
        </div>
      </div>

      <div class="analytics-container">
        <div class="board-section">
          <svg id="catanBoard" width="700" height="700" viewBox="-350 -350 700 700"></svg>
        </div>

        <div class="analytics-sidebar">
          <div class="turn-controls">
            <h3>Turn Navigation</h3>
            <div class="slider-container" style="display: flex; align-items: center; gap: 8px;">
              <input type="range" id="turnSlider" min="0" max="100" value="0" style="flex-grow: 1;">
            </div>
            <div class="button-row" style="display: flex; justify-content: center; gap: 10px;">
              <button id="prevAnalyticsTurnBtn" class="tab-btn"
                style="padding: 8px 16px; flex: 1; max-width: 120px;">&lt; Previous</button>
              <button id="nextAnalyticsTurnBtn" class="tab-btn"
                style="padding: 8px 16px; flex: 1; max-width: 120px;">Next &gt;</button>
            </div>
            <p id="turnInfo" style="text-align: center; margin-top: 4px;">Turn 0 / 0</p>
          </div>

          <div class="dice-section">
            <h3>Dice Distribution</h3>
            <div id="analyticsRollHistory"
              style="font-size: 11px; color: #cbd5e1; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
            </div>
          </div>

          <div class="event-log-section">
            <h3>Game Log</h3>
            <div id="analyticsEventLog" class="history-box" style="max-height: 250px;"></div>
          </div>

          <div class="bank-state-section">
            <h3>Bank <img src="./data/images/bank.svg" alt="Bank" style="width: 20px; height: 20px;"> </h3>
            <div id="analyticsBankTracker" class="player-card" style="padding: 10px;"></div>
          </div>

          <div class="player-tracker-section">
            <h3>Players</h3>
            <div id="analyticsPlayerTracker" style="max-height: 300px;"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="playgroundTab" class="tab-panel">
      <div class="playground-grid">
        <div class="card">
          <h2>Setup</h2>
          <div class="field-row">
            <label for="playerCount">Players</label>
            <input id="playerCount" type="number" min="2" max="8" value="4">
            <button id="createGameBtn" type="button">Create / Reset</button>
          </div>
          <p class="muted">Use the controls below to track your own live game.</p>
        </div>

        <div class="card">
          <h2>Turn Order</h2>
          <div id="turnOrderList"></div>
          <div class="field-row">
            <button id="prevTurnBtn" type="button">Previous Turn</button>
            <button id="nextTurnBtn" type="button">Next Turn</button>
            <button id="confirmTurnOrderBtn" type="button">Confirm Turn Order</button>
          </div>
          <p id="turnStatus" class="status-line">No game initialized.</p>
        </div>

        <div class="card">
          <h2>Dice Rolls</h2>
          <div class="field-row">
            <label for="diceValue">Roll</label>
            <input id="diceValue" type="number" min="2" max="12" value="7">
            <button id="addRollBtn" type="button">Add Roll</button>
          </div>
          <p id="diceSummary" class="status-line">No rolls recorded yet.</p>
          <div id="playgroundRollHistory" class="history-box"></div>
        </div>

        <div class="card">
          <h2>Resources & Development Cards</h2>
          <div class="field-row">
            <label for="playerSelector">Player</label>
            <select id="playerSelector"></select>
          </div>
          <div class="field-row">
            <label for="resourceType">Resource</label>
            <select id="resourceType">
              <option value="wood">Wood</option>
              <option value="brick">Brick</option>
              <option value="sheep">Sheep</option>
              <option value="wheat">Wheat</option>
              <option value="ore">Ore</option>
            </select>
            <input id="resourceAmount" type="number" min="1" value="1">
            <button id="addResourceBtn" type="button">+</button>
            <button id="removeResourceBtn" type="button">-</button>
          </div>
          <div class="field-row">
            <label for="devCardType">Dev Card</label>
            <select id="devCardType">
              <option value="knight">Knight</option>
              <option value="victoryPoint">Victory Point</option>
              <option value="roadBuilding">Road Building</option>
              <option value="yearOfPlenty">Year of Plenty</option>
              <option value="monopoly">Monopoly</option>
            </select>
            <input id="devCardAmount" type="number" min="1" value="1">
            <button id="addDevCardBtn" type="button">+</button>
            <button id="removeDevCardBtn" type="button">-</button>
          </div>
        </div>

        <div class="card card-wide">
          <h2>Player Tracker</h2>
          <div id="playerTracker"></div>
        </div>
      </div>
    </section>
  </div>
  <script src="js/script.js"></script>
</body>

</html>
